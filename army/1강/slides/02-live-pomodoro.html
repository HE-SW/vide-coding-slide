<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>첫 라이브 — Pomodoro 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px;
  padding: 44px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.title {
  font-size: 48px;
  font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: 16px;
  line-height: 1.3;
}
.subtitle {
  font-size: 16px;
  color: #8b949e;
  text-align: center;
  margin-bottom: 40px;
}
.prompt-box {
  background: rgba(22, 27, 40, 0.8);
  border: 1px solid rgba(124, 58, 237, 0.3);
  border-radius: 12px;
  padding: 22px 28px;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  color: #c9d1d9;
  width: 100%;
  max-width: 900px;
  margin-bottom: 44px;
}
.prompt-tag {
  display: inline-block;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #a78bfa;
  background: rgba(124, 58, 237, 0.15);
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 12px;
}
.prompt-arrow { color: #7c3aed; }

.cards {
  display: flex;
  gap: 32px;
  margin-bottom: 20px;
  width: 100%;
}
.card {
  flex: 1;
  background: linear-gradient(145deg, rgba(124, 58, 237, 0.1), rgba(56, 189, 248, 0.05));
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 20px;
  padding: 36px 26px;
  text-align: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px);
  animation: cardAppear 0.6s ease-out forwards;
}
.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.6s; }
.card:nth-child(3) { animation-delay: 1.0s; }
@keyframes cardAppear {
  to { opacity: 1; transform: translateY(0); }
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #7c3aed, #38bdf8);
}
.card-icon { font-size: 44px; margin-bottom: 18px; display: block; }
.card-text { font-size: 16px; font-weight: 500; line-height: 1.7; color: #c9d1d9; }
.card-label {
  display: inline-block; margin-top: 14px; padding: 4px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  background: rgba(124, 58, 237, 0.2);
  color: #a78bfa;
}

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; font-family: 'Noto Sans KR', sans-serif;
}
.slide-nav-inner {
  width: 1280px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 60px;
}
.slide-nav a {
  text-decoration: none; font-size: 14px; font-weight: 700;
  color: #7c3aed; transition: color 0.2s;
}
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-12px); }
}
</style>
</head>
<body>
<div class="container">
  <h1 class="title">첫 라이브 — 같이 입력</h1>
  <p class="subtitle">5분 안에 도구 1개를 만들어 봅시다</p>

  <div class="prompt-box">
    <div class="prompt-tag">함께 입력 #1</div>
    <div><span class="prompt-arrow">&gt;</span> Pomodoro 타이머 만들어줘. 25분 일하고 5분 쉬는 거.<br>&nbsp;&nbsp;&nbsp;디자인은 미니멀하게, 다크 테마로.</div>
  </div>

  <div class="cards">
    <div class="card">
      <span class="card-icon">⌨️</span>
      <p class="card-text">자기 PC에<br>그대로 입력</p>
      <span class="card-label">5분</span>
    </div>
    <div class="card">
      <span class="card-icon">⏳</span>
      <p class="card-text">결과가 나올 때까지<br>기다리기</p>
      <span class="card-label">대기</span>
    </div>
    <div class="card">
      <span class="card-icon">👀</span>
      <p class="card-text">옆 사람과<br>결과 비교</p>
      <span class="card-label">3분</span>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="01-cover.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">02 / 14</a></div>
    <div class="nav-right"><a href="03-part1-cover.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('01-cover.html');
  if (e.key === 'ArrowRight') navigateTo('03-part1-cover.html');
});
</script>
</body>
</html>
