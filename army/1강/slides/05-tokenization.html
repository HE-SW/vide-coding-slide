<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>토큰 — strawberry R 카운팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px; padding: 44px 80px;
  display: flex; flex-direction: column; align-items: center;
}
.eyebrow {
  font-size: 14px; font-weight: 700; letter-spacing: 4px;
  color: #a78bfa; margin-bottom: 14px; text-transform: uppercase;
}
.title {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 16px; line-height: 1.3;
}
.subtitle { font-size: 16px; color: #8b949e; text-align: center; margin-bottom: 36px; }

.prompt-box {
  background: rgba(22, 27, 40, 0.8);
  border: 1px solid rgba(124, 58, 237, 0.3);
  border-radius: 12px;
  padding: 16px 24px;
  font-family: 'Courier New', monospace;
  font-size: 15px; color: #c9d1d9;
  margin-bottom: 36px;
}
.prompt-tag {
  display: inline-block; font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: #a78bfa; background: rgba(124, 58, 237, 0.15);
  padding: 3px 10px; border-radius: 4px; margin-bottom: 8px;
}
.prompt-arrow { color: #7c3aed; }

.comparison { width: 100%; max-width: 1100px; }
.comparison-row {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px;
  align-items: stretch; margin-bottom: 20px;
}
.comp-side {
  border-radius: 14px; padding: 24px 28px;
  display: flex; flex-direction: column; gap: 12px;
}
.comp-old {
  background: rgba(139, 148, 158, 0.06);
  border: 1px solid rgba(139, 148, 158, 0.18);
}
.comp-new {
  background: rgba(124, 58, 237, 0.08);
  border: 1px solid rgba(124, 58, 237, 0.3);
}
.comp-label { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
.comp-old .comp-label { color: #8b949e; }
.comp-new .comp-label { color: #a78bfa; }
.comp-view {
  font-family: 'Courier New', monospace;
  font-size: 22px; font-weight: 700;
  letter-spacing: 8px;
  text-align: center; padding: 14px 0;
}
.comp-old .comp-view { color: #c9d1d9; }
.comp-new .comp-view { color: #e6edf3; }
.comp-old .comp-view .hl { color: #ef4444; }
.comp-new .comp-view .chunk { padding: 4px 12px; border-radius: 6px; background: rgba(124, 58, 237, 0.25); }
.comp-answer {
  text-align: center; font-size: 18px; font-weight: 900;
  padding-top: 8px; border-top: 1px dashed rgba(139, 148, 158, 0.2);
}
.comp-old .comp-answer { color: #34d399; }
.comp-new .comp-answer { color: #ef4444; }
.comp-arrow { font-size: 28px; color: #7c3aed; align-self: center; }

.note {
  text-align: center; font-size: 15px; color: #8b949e;
  margin-top: 8px;
}
.note strong { color: #c9d1d9; }

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">단어 2</div>
  <h1 class="title">토큰 — strawberry R 카운팅</h1>
  <p class="subtitle">LLM은 글자가 아니라 *덩어리*로 읽는다</p>

  <div class="prompt-box">
    <div class="prompt-tag">함께 입력 #2</div>
    <div><span class="prompt-arrow">&gt;</span> strawberry라는 단어에 R이 몇 개 들어가?</div>
  </div>

  <div class="comparison">
    <div class="comparison-row">
      <div class="comp-side comp-old">
        <span class="comp-label">사람의 시선</span>
        <div class="comp-view">s · t · <span class="hl">r</span> · a · w · b · e · <span class="hl">r</span> · <span class="hl">r</span> · y</div>
        <div class="comp-answer">정답 — 3개</div>
      </div>
      <div class="comp-arrow">vs</div>
      <div class="comp-side comp-new">
        <span class="comp-label">LLM의 시선</span>
        <div class="comp-view"><span class="chunk">straw</span> + <span class="chunk">berry</span></div>
        <div class="comp-answer">자주 — 2개라고 답함</div>
      </div>
    </div>
  </div>

  <p class="note">덩어리 안에 R이 몇 개인지 <strong>직접 보지 못한다</strong> — 글자 정보가 녹아 사라진 상태에서 추측</p>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="04-llm.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">05 / 14</a></div>
    <div class="nav-right"><a href="06-hallucination.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('04-llm.html');
  if (e.key === 'ArrowRight') navigateTo('06-hallucination.html');
});
</script>
</body>
</html>
