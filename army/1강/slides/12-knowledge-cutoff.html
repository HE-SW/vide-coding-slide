<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>지식 컷오프 — 어제 일을 모름</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px; padding: 44px 80px;
  display: flex; flex-direction: column; align-items: center;
}
.eyebrow {
  font-size: 14px; font-weight: 700; letter-spacing: 4px;
  color: #a78bfa; margin-bottom: 14px; text-transform: uppercase;
}
.title {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 16px; line-height: 1.3;
}
.subtitle { font-size: 16px; color: #8b949e; text-align: center; margin-bottom: 38px; }
.subtitle code {
  background: rgba(124, 58, 237, 0.1);
  padding: 2px 8px; border-radius: 4px;
  color: #c9d1d9; font-family: 'Courier New', monospace; font-size: 13px;
}

.cards {
  display: flex; gap: 24px; width: 100%;
}
.card {
  flex: 1;
  background: linear-gradient(145deg, rgba(124, 58, 237, 0.1), rgba(56, 189, 248, 0.05));
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 20px; padding: 32px 24px;
  text-align: center; position: relative; overflow: hidden;
  opacity: 0; transform: translateY(30px);
  animation: cardAppear 0.6s ease-out forwards;
}
.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.6s; }
.card:nth-child(3) { animation-delay: 1.0s; }
@keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, #7c3aed, #38bdf8);
}
.card-icon { font-size: 40px; margin-bottom: 16px; display: block; }
.card-title { font-size: 18px; font-weight: 900; margin-bottom: 12px; color: #e6edf3; }
.card-text { font-size: 14px; font-weight: 400; line-height: 1.65; color: #c9d1d9; }
.card-text strong { color: #a78bfa; font-weight: 700; }
.card-cutoff {
  margin-top: 14px; padding: 8px 16px;
  background: rgba(124, 58, 237, 0.15);
  border-radius: 6px; font-size: 13px; font-weight: 700;
  color: #a78bfa;
  display: inline-block;
}

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">단어 7</div>
  <h1 class="title">지식 컷오프 — 어제 일을 모른다</h1>
  <p class="subtitle">함께 입력 #6 — <code>오늘 서울 날씨</code> · <code>어제 한국 뉴스 헤드라인</code></p>

  <div class="cards">
    <div class="card">
      <span class="card-icon">📚</span>
      <h3 class="card-title">정의</h3>
      <p class="card-text">학습 데이터가 잘려 있는 시점까지만 안다. 그 이후 일은 <strong>모름</strong>.</p>
      <span class="card-cutoff">Claude 4.7 컷오프 · 2026-01</span>
    </div>
    <div class="card">
      <span class="card-icon">📰</span>
      <h3 class="card-title">일상 비유</h3>
      <p class="card-text"><strong>어제 신문 못 읽고 출근한 직원.</strong> 회의에서 의견 묻는데 추측으로 답하면 위험.</p>
    </div>
    <div class="card">
      <span class="card-icon">🔌</span>
      <h3 class="card-title">2가지 해결</h3>
      <p class="card-text"><strong>1. 컨텍스트로 채우기</strong> — 오늘 뉴스 직접 첨부<br><strong>2. 도구 연결 (MCP)</strong> — 검색·캘린더 실시간 도구</p>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="11-sycophancy.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">12 / 14</a></div>
    <div class="nav-right"><a href="13-live-round.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('11-sycophancy.html');
  if (e.key === 'ArrowRight') navigateTo('13-live-round.html');
});
</script>
</body>
</html>
