<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>마무리 — 2강 예고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding-bottom: 50px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 800px; height: 800px; border-radius: 50%;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
  filter: blur(30px);
  pointer-events: none;
}
.container {
  width: 1280px; padding: 44px 80px;
  display: flex; flex-direction: column; align-items: center;
  position: relative; z-index: 1;
}
.title {
  font-size: 42px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 14px; line-height: 1.3;
}
.subtitle { font-size: 15px; color: #8b949e; text-align: center; margin-bottom: 32px; }

.summary-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; width: 100%; margin-bottom: 32px;
}
.summary-card {
  background: rgba(22, 27, 40, 0.8);
  border: 1px solid rgba(139, 148, 158, 0.1);
  border-radius: 14px; padding: 20px 18px; text-align: center;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(20px);
  animation: cardIn 0.5s ease-out forwards;
}
@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
.summary-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, #7c3aed, #38bdf8);
}
.summary-card:nth-child(1) { animation-delay: 0.1s; }
.summary-card:nth-child(2) { animation-delay: 0.2s; }
.summary-card:nth-child(3) { animation-delay: 0.3s; }
.summary-card:nth-child(4) { animation-delay: 0.4s; }
.summary-card:nth-child(5) { animation-delay: 0.5s; }
.summary-card:nth-child(6) { animation-delay: 0.6s; }
.summary-card:nth-child(7) { animation-delay: 0.7s; }
.card-icon { font-size: 30px; margin-bottom: 10px; display: block; }
.card-name { font-size: 15px; font-weight: 900; margin-bottom: 6px; color: #e6edf3; }
.card-desc { font-size: 12px; color: #8b949e; line-height: 1.5; }

.next-box {
  width: 100%; max-width: 1100px;
  background: rgba(124, 58, 237, 0.06);
  border: 1px solid rgba(124, 58, 237, 0.3);
  border-radius: 16px; padding: 28px 36px;
  text-align: center;
}
.next-label {
  font-size: 12px; font-weight: 900; letter-spacing: 2px;
  color: #a78bfa; margin-bottom: 10px; text-transform: uppercase;
}
.next-title {
  font-size: 26px; font-weight: 900; margin-bottom: 14px;
  background: linear-gradient(90deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.next-rings {
  display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;
  font-size: 14px; color: #c9d1d9;
}
.next-rings span {
  padding: 6px 16px; border-radius: 100px;
  background: rgba(124, 58, 237, 0.12);
  border: 1px solid rgba(124, 58, 237, 0.25);
}
.next-rings span strong { color: #a78bfa; font-weight: 700; }

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">오늘 본 단어 7개</h1>
  <p class="subtitle">자기 눈으로 본 LLM의 한계 · 자기 손으로 시킨 첫 도구</p>

  <div class="summary-grid">
    <div class="summary-card">
      <span class="card-icon">🤖</span>
      <div class="card-name">LLM</div>
      <p class="card-desc">다음 단어 예측 기계</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">🍓</span>
      <div class="card-name">토큰</div>
      <p class="card-desc">덩어리로 읽는다</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">💭</span>
      <div class="card-name">환각</div>
      <p class="card-desc">그럴듯한 거짓말</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">🎲</span>
      <div class="card-name">비결정성</div>
      <p class="card-desc">매번 다른 답</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">✨</span>
      <div class="card-name">바이브코딩</div>
      <p class="card-desc">2025-02 Karpathy</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">🙇</span>
      <div class="card-name">시코펀시</div>
      <p class="card-desc">아부, 답 뒤집기</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">📅</span>
      <div class="card-name">지식 컷오프</div>
      <p class="card-desc">어제 일을 모름</p>
    </div>
    <div class="summary-card">
      <span class="card-icon">🚀</span>
      <div class="card-name">다음 강의</div>
      <p class="card-desc">잘 시키는 법</p>
    </div>
  </div>

  <div class="next-box">
    <div class="next-label">2강 예고</div>
    <h2 class="next-title">같은 일을 잘 시키는 법</h2>
    <div class="next-rings">
      <span><strong>1겹</strong> 프롬프트 엔지니어링</span>
      <span><strong>2겹</strong> 컨텍스트 엔지니어링</span>
      <span><strong>3겹</strong> 하니스 엔지니어링</span>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="13-live-round.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">14 / 14</a></div>
    <div class="nav-right"><span class="nav-disabled">다음 &rarr;</span></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('13-live-round.html');
});
</script>
</body>
</html>
