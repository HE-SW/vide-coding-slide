<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>LLM — 다음 단어 예측 기계</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px; padding: 44px 80px;
  display: flex; flex-direction: column; align-items: center;
}
.eyebrow {
  font-size: 14px; font-weight: 700; letter-spacing: 4px;
  color: #a78bfa; margin-bottom: 14px; text-transform: uppercase;
}
.title {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 24px; line-height: 1.3;
}
.tagline {
  font-size: 22px; color: #c9d1d9; text-align: center;
  margin-bottom: 50px; font-weight: 300; line-height: 1.6;
}
.tagline strong { color: #a78bfa; font-weight: 700; }

.cards {
  display: flex; gap: 28px; width: 100%;
}
.card {
  flex: 1;
  background: linear-gradient(145deg, rgba(124, 58, 237, 0.1), rgba(56, 189, 248, 0.05));
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 20px; padding: 36px 26px;
  text-align: center; position: relative; overflow: hidden;
  opacity: 0; transform: translateY(30px);
  animation: cardAppear 0.6s ease-out forwards;
}
.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.6s; }
.card:nth-child(3) { animation-delay: 1.0s; }
@keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, #7c3aed, #38bdf8);
}
.card-icon { font-size: 44px; margin-bottom: 16px; display: block; }
.card-title { font-size: 18px; font-weight: 900; margin-bottom: 12px; color: #e6edf3; }
.card-text { font-size: 15px; font-weight: 400; line-height: 1.6; color: #c9d1d9; }
.card-list { text-align: left; font-size: 13px; color: #8b949e; line-height: 1.9; }
.card-list strong { color: #c9d1d9; font-weight: 700; }

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.slide-nav-inner {
  width: 1280px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 60px;
}
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">단어 1</div>
  <h1 class="title">LLM — Large Language Model</h1>
  <p class="tagline">다음에 올 단어를 가장 <strong>그럴듯하게 예측</strong>하는 기계. 그게 다입니다.</p>

  <div class="cards">
    <div class="card">
      <span class="card-icon">🎯</span>
      <h3 class="card-title">정의</h3>
      <p class="card-text">"오늘 점심은…" 다음에 올<br>단어를 확률로 계산해서<br>가장 가능성 높은 걸 내놓는 기계</p>
    </div>
    <div class="card">
      <span class="card-icon">📱</span>
      <h3 class="card-title">일상 비유</h3>
      <p class="card-text">스마트폰 자동완성의 끝판왕<br>카톡 위 추천 단어를<br>무한히 길게 정교하게 한 것</p>
    </div>
    <div class="card">
      <span class="card-icon">🤖</span>
      <h3 class="card-title">2026-05 라인업</h3>
      <div class="card-list">
        <strong>OpenAI</strong> · GPT-5<br>
        <strong>Anthropic</strong> · Claude 4.7<br>
        <strong>Google</strong> · Gemini 2
      </div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="03-part1-cover.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">04 / 14</a></div>
    <div class="nav-right"><a href="05-tokenization.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('03-part1-cover.html');
  if (e.key === 'ArrowRight') navigateTo('05-tokenization.html');
});
</script>
</body>
</html>
