<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>1부 — 단어 4개로 LLM의 정체</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 50px;
}
.container {
  width: 1280px;
  padding: 44px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.kicker {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 6px;
  color: #8b949e;
  margin-bottom: 20px;
  text-transform: uppercase;
}
.title {
  font-size: 64px;
  font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.2;
}
.subtitle {
  font-size: 18px;
  color: #c9d1d9;
  text-align: center;
  margin-bottom: 60px;
  font-weight: 300;
}
.words {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.word {
  padding: 16px 28px;
  border: 1px solid rgba(124, 58, 237, 0.3);
  border-radius: 12px;
  background: rgba(124, 58, 237, 0.06);
  font-size: 18px;
  font-weight: 700;
  color: #c9d1d9;
  opacity: 0;
  transform: translateY(20px);
  animation: wordIn 0.5s ease-out forwards;
}
.word:nth-child(1) { animation-delay: 0.2s; }
.word:nth-child(2) { animation-delay: 0.35s; }
.word:nth-child(3) { animation-delay: 0.5s; }
.word:nth-child(4) { animation-delay: 0.65s; }
@keyframes wordIn { to { opacity: 1; transform: translateY(0); } }
.word-num { font-size: 12px; color: #7c3aed; font-weight: 900; margin-right: 10px; }

.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
  background: rgba(10, 15, 26, 0.95);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(124, 58, 237, 0.2);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.slide-nav-inner {
  width: 1280px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 60px;
}
.slide-nav a {
  text-decoration: none; font-size: 14px; font-weight: 700;
  color: #7c3aed; transition: color 0.2s;
}
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }

body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <div class="kicker">PART 1 · 45분</div>
  <h1 class="title">단어 4개로<br>LLM의 정체</h1>
  <p class="subtitle">우리가 만진 그 도구의 심장</p>

  <div class="words">
    <span class="word"><span class="word-num">01</span>LLM</span>
    <span class="word"><span class="word-num">02</span>토큰</span>
    <span class="word"><span class="word-num">03</span>환각</span>
    <span class="word"><span class="word-num">04</span>비결정성</span>
  </div>
</div>

<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="02-live-pomodoro.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">03 / 14</a></div>
    <div class="nav-right"><a href="04-llm.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>

<script>
function navigateTo(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() { window.location.href = url; }, 300);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('02-live-pomodoro.html');
  if (e.key === 'ArrowRight') navigateTo('04-llm.html');
});
</script>
</body>
</html>
