<div class="container">
  <h1 class="title">strawberry에는 R이 몇 개?</h1>
  <div class="sub">정답은 <strong style="color:#f87171">3개</strong>인데, AI는 자주 "2개"라고 자신만만하게 답합니다</div>

  <div class="viz">
    <div class="row">
      <div class="row-label">우리가 보는 것</div>
      <div class="letter">s</div><div class="letter">t</div><div class="letter r">r</div><div class="letter">a</div><div class="letter">w</div><div class="letter">b</div><div class="letter">e</div><div class="letter r">r</div><div class="letter r">r</div><div class="letter">y</div>
    </div>
    <div class="arrow-down">↓</div>
    <div class="row">
      <div class="row-label">AI가 보는 것</div>
      <div class="token">straw</div>
      <div class="token-num">+</div>
      <div class="token">berry</div>
    </div>
  </div>

  <div class="bottom">AI는 글자를 한 자씩 보지 않습니다. <strong>토큰(token)</strong> 이라는 단어 덩어리로 봅니다. 토큰은 하나의 숫자 묶음으로 변환되면서, 그 안의 글자 정보가 <strong>녹아서 사라져버립니다</strong>. AI가 똑똑하다는 건 <em>어떤 일에 똑똑한가</em>의 문제이지, 모든 일에 똑똑하다는 뜻이 아닙니다.</div>
</div>
