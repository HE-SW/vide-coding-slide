<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>세 가지 엔지니어링</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 16px; line-height: 1.3;
}
.subtitle { font-size: 17px; color: #8b949e; margin-bottom: 60px; font-weight: 300; }
.flow { display: flex; align-items: center; gap: 12px; max-width: 1140px; width: 100%; }
.stage {
  flex: 1; background: rgba(139, 148, 158, 0.04);
  border: 1px solid rgba(139, 148, 158, 0.15);
  border-radius: 18px; padding: 32px 28px;
  display: flex; flex-direction: column; gap: 16px;
  position: relative; min-height: 280px;
  opacity: 0; animation: stageIn 0.5s ease forwards;
}
.stage:nth-child(1) { animation-delay: 0.1s; }
.stage:nth-child(3) { animation-delay: 0.35s; border-color: rgba(124, 58, 237, 0.35); background: rgba(124, 58, 237, 0.04); }
.stage:nth-child(5) { animation-delay: 0.6s; border-color: rgba(56, 189, 248, 0.4); background: rgba(56, 189, 248, 0.04); }
@keyframes stageIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.arrow {
  font-size: 36px; color: #484f58; font-weight: 300;
}
.stage-num {
  font-size: 12px; color: #8b949e; font-weight: 700; letter-spacing: 2px;
}
.stage:nth-child(3) .stage-num { color: #a78bfa; }
.stage:nth-child(5) .stage-num { color: #38bdf8; }
.stage-name { font-size: 22px; font-weight: 900; color: #e6edf3; line-height: 1.3; }
.stage-en { font-size: 13px; color: #8b949e; font-weight: 500; margin-top: 2px; }
.stage-ask {
  margin-top: 4px; padding: 12px 14px;
  background: rgba(0,0,0,0.3); border-radius: 10px;
  font-size: 14px; color: #c9d1d9; font-style: italic; line-height: 1.55;
}
.stage-ask strong { color: #e6edf3; font-style: normal; font-weight: 700; }
.bottom {
  margin-top: 50px; font-size: 17px; color: #8b949e; text-align: center;
}
.bottom strong { color: #c9d1d9; font-weight: 700; }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">세 가지 엔지니어링</h1>
  <div class="subtitle">지침을 잘 넣어주는 일에는 — 안쪽에서 바깥쪽으로 점점 넓어지는 세 단계</div>

  <div class="flow">
    <div class="stage">
      <div class="stage-num">01 · PROMPT</div>
      <div class="stage-name">프롬프트 엔지니어링<div class="stage-en">Prompt Engineering</div></div>
      <div class="stage-ask"><strong>무엇을</strong>, 어떻게 요청할 것인가</div>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <div class="stage-num">02 · CONTEXT</div>
      <div class="stage-name">컨텍스트 엔지니어링<div class="stage-en">Context Engineering</div></div>
      <div class="stage-ask"><strong>어떤 정보를</strong> 함께 줄 것인가</div>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <div class="stage-num">03 · HARNESS</div>
      <div class="stage-name">하니스 엔지니어링<div class="stage-en">Harness Engineering</div></div>
      <div class="stage-ask"><strong>어떻게 반복해서</strong> 검증할 것인가</div>
    </div>
  </div>

  <div class="bottom">한 단계씩 차근차근 — <strong>안쪽 핵 → 바깥 껍질</strong>로 점점 넓어집니다</div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="09-guidance-raises-probability.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">10 / 23</a></div>
    <div class="nav-right"><a href="11-all-three-coexist.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('09-guidance-raises-probability.html');
  if (e.key === 'ArrowRight') navigateTo('11-all-three-coexist.html');
});
</script>
</body>
</html>
