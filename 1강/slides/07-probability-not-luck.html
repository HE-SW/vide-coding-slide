<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1280" />
        <title>좋은 결과는 우연이 아니라 설계입니다</title>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0f1a;
                font-family: "Noto Sans KR", sans-serif;
                color: #e6edf3;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding-bottom: 50px;
                position: relative;
                overflow: hidden;
            }
            body::before {
                content: "";
                position: absolute;
                width: 800px;
                height: 800px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(124, 58, 237, 0.18), transparent 70%);
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            .container {
                width: 1280px;
                padding: 44px 80px;
                display: flex;
                flex-direction: column;
                align-items: center;
                position: relative;
                z-index: 1;
            }
            .kicker {
                font-size: 14px;
                color: #a78bfa;
                font-weight: 700;
                letter-spacing: 5px;
                padding: 8px 20px;
                border: 1px solid rgba(124, 58, 237, 0.4);
                border-radius: 999px;
                background: rgba(124, 58, 237, 0.08);
                margin-bottom: 36px;
            }
            .big {
                font-size: 88px;
                font-weight: 900;
                background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #38bdf8 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                text-align: center;
                line-height: 1.15;
                margin-bottom: 32px;
                letter-spacing: -2px;
            }
            .big-line2 {
                font-size: 56px;
            }
            .below {
                font-size: 20px;
                color: #c9d1d9;
                max-width: 880px;
                text-align: center;
                line-height: 1.7;
                font-weight: 300;
            }
            .below strong {
                color: #e6edf3;
                font-weight: 700;
            }
            .below em {
                color: #a78bfa;
                font-style: normal;
                font-weight: 500;
            }
            .slide-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 50px;
                background: rgba(10, 15, 26, 0.95);
                backdrop-filter: blur(12px);
                border-top: 1px solid rgba(124, 58, 237, 0.2);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
            .slide-nav-inner {
                width: 1280px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 60px;
            }
            .slide-nav a {
                text-decoration: none;
                font-size: 14px;
                font-weight: 700;
                color: #7c3aed;
            }
            .slide-nav a:hover {
                color: #a78bfa;
            }
            .slide-nav .nav-disabled {
                font-size: 14px;
                font-weight: 700;
                color: #484f58;
            }
            .slide-nav .nav-center a {
                color: #8b949e;
                font-size: 13px;
                font-weight: 400;
            }
            .slide-nav .nav-center a:hover {
                color: #e6edf3;
            }
            body {
                opacity: 0;
                animation: fadeIn 0.6s ease forwards;
            }
            body.fade-out {
                animation: fadeOut 0.3s ease forwards;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                    transform: translateY(-12px);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="kicker">CORE MESSAGE</div>
            <div class="big">바이브코딩의 좋은 결과는<br /><span class="big-line2">우연이 아니라 설계입니다</span></div>
            <div class="below">
                우리가 할 일은 <em>AI를 완벽하게 만드는 것</em>이 아닙니다. 같은 AI에게 같은 질문을 해도,
                <strong>좋은 결과가 나올 확률을 끌어올리는 것</strong> — 그게 바이브 코딩 실무의 본질입니다.
            </div>
        </div>
        <nav class="slide-nav">
            <div class="slide-nav-inner">
                <div class="nav-left">
                    <a
                        href="06-strawberry.html"
                        onclick="
                            event.preventDefault();
                            navigateTo(this.href);
                        "
                        >&larr; 이전</a
                    >
                </div>
                <div class="nav-center"><a href="index.html">07 / 23</a></div>
                <div class="nav-right">
                    <a
                        href="08-knowledge-cutoff.html"
                        onclick="
                            event.preventDefault();
                            navigateTo(this.href);
                        "
                        >다음 &rarr;</a
                    >
                </div>
            </div>
        </nav>
        <script>
            function navigateTo(url) {
                document.body.classList.add("fade-out");
                setTimeout(function () {
                    window.location.href = url;
                }, 300);
            }
            document.addEventListener("keydown", function (e) {
                if (e.key === "ArrowLeft") navigateTo("06-strawberry.html");
                if (e.key === "ArrowRight") navigateTo("08-knowledge-cutoff.html");
            });
        </script>
    </body>
</html>
