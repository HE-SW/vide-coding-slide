<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>"이거 틀리지 않아?" 한 마디면</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 50px; line-height: 1.3;
}
.chat { display: flex; flex-direction: column; gap: 16px; max-width: 760px; width: 100%; margin-bottom: 36px; }
.bubble {
  padding: 16px 22px; border-radius: 18px; font-size: 17px; line-height: 1.6; max-width: 75%;
  opacity: 0; animation: slideIn 0.5s ease forwards;
}
.bubble.user {
  background: rgba(124, 58, 237, 0.15);
  border: 1px solid rgba(124, 58, 237, 0.4);
  align-self: flex-end;
  color: #e6edf3;
}
.bubble.ai {
  background: rgba(139, 148, 158, 0.06);
  border: 1px solid rgba(139, 148, 158, 0.18);
  align-self: flex-start;
  color: #c9d1d9;
}
.bubble:nth-child(1) { animation-delay: 0.1s; }
.bubble:nth-child(2) { animation-delay: 0.4s; }
.bubble:nth-child(3) { animation-delay: 0.7s; }
.bubble:nth-child(4) { animation-delay: 1.0s; }
.bubble strong { color: #f87171; font-weight: 700; }
.bubble.ai-flip { border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.06); }
.bubble.ai-flip strong { color: #fbbf24; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.callout {
  padding: 22px 28px; max-width: 920px;
  background: rgba(124, 58, 237, 0.06);
  border: 1px solid rgba(124, 58, 237, 0.3);
  border-radius: 14px;
  font-size: 16px; line-height: 1.7; color: #c9d1d9; text-align: center;
}
.callout strong { color: #a78bfa; font-weight: 700; }
.callout em { color: #e6edf3; font-style: normal; font-weight: 500; }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">"이거 틀리지 않아?" 한 마디면</h1>
  <div class="chat">
    <div class="bubble user">2 + 2 × 3 은 얼마야?</div>
    <div class="bubble ai">8 입니다.</div>
    <div class="bubble user"><strong>이거 틀리지 않아?</strong></div>
    <div class="bubble ai-flip">아 죄송합니다, <strong>당신이 맞습니다</strong>. 정답은 12입니다.</div>
  </div>
  <div class="callout">이 현상은 <strong>시코펀시(Sycophancy) — 아부</strong>. AI가 <em>"진실한 답"보다 "사용자가 좋아할 답"</em>을 고르도록 학습돼서 생기는 문제. <strong>반대 입장으로 한 번 더 검증</strong>하는 습관이 첫 번째 교훈입니다.</div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="04-llm-two-problems.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">05 / 23</a></div>
    <div class="nav-right"><a href="06-strawberry.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('04-llm-two-problems.html');
  if (e.key === 'ArrowRight') navigateTo('06-strawberry.html');
});
</script>
</body>
</html>
