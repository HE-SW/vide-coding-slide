<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1280" />
        <title>AI는 어제 일을 모릅니다</title>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0f1a;
                font-family: "Noto Sans KR", sans-serif;
                color: #e6edf3;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding-bottom: 50px;
            }
            .container {
                width: 1280px;
                padding: 44px 80px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .title {
                font-size: 48px;
                font-weight: 900;
                background: linear-gradient(135deg, #7c3aed, #38bdf8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                text-align: center;
                margin-bottom: 12px;
                line-height: 1.3;
            }
            .subtitle {
                font-size: 18px;
                color: #8b949e;
                margin-bottom: 50px;
                font-weight: 300;
            }
            .timeline {
                display: flex;
                align-items: center;
                gap: 0;
                max-width: 1080px;
                width: 100%;
                margin-bottom: 40px;
            }
            .line {
                position: relative;
                flex: 1;
                height: 4px;
                background: linear-gradient(
                    90deg,
                    rgba(56, 189, 248, 0.6) 0%,
                    rgba(124, 58, 237, 0.6) 100%,
                    rgba(248, 113, 113, 0.3) 60%,
                    rgba(248, 113, 113, 0.3) 100%
                );
                border-radius: 2px;
            }
            .dot {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #7c3aed;
                box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.25);
                flex-shrink: 0;
            }
            .dot.now {
                background: #f87171;
                box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.2);
            }
            .labels {
                display: flex;
                justify-content: space-between;
                max-width: 1080px;
                width: 100%;
                margin-bottom: 36px;
                padding: 0 4px;
            }
            .label {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
            }
            .label-tag {
                font-size: 11px;
                color: #8b949e;
                font-weight: 700;
                letter-spacing: 2px;
            }
            .label-text {
                font-size: 16px;
                color: #e6edf3;
                font-weight: 700;
            }
            .label.cutoff .label-tag {
                color: #a78bfa;
            }
            .label.now .label-tag {
                color: #f87171;
            }
            .below {
                margin-top: 12px;
                padding: 24px 32px;
                max-width: 1000px;
                background: rgba(139, 148, 158, 0.04);
                border: 1px solid rgba(139, 148, 158, 0.15);
                border-radius: 14px;
                font-size: 17px;
                line-height: 1.7;
                color: #c9d1d9;
            }
            .below strong {
                color: #e6edf3;
                font-weight: 700;
            }
            .below em {
                color: #a78bfa;
                font-style: italic;
            }
            .slide-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 50px;
                background: rgba(10, 15, 26, 0.95);
                backdrop-filter: blur(12px);
                border-top: 1px solid rgba(124, 58, 237, 0.2);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
            .slide-nav-inner {
                width: 1280px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 60px;
            }
            .slide-nav a {
                text-decoration: none;
                font-size: 14px;
                font-weight: 700;
                color: #7c3aed;
            }
            .slide-nav a:hover {
                color: #a78bfa;
            }
            .slide-nav .nav-disabled {
                font-size: 14px;
                font-weight: 700;
                color: #484f58;
            }
            .slide-nav .nav-center a {
                color: #8b949e;
                font-size: 13px;
                font-weight: 400;
            }
            .slide-nav .nav-center a:hover {
                color: #e6edf3;
            }
            body {
                opacity: 0;
                animation: fadeIn 0.4s ease forwards;
            }
            body.fade-out {
                animation: fadeOut 0.3s ease forwards;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                    transform: translateY(-12px);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 class="title">AI는 어제 일을 모릅니다</h1>
            <div class="subtitle">최근에 나온 모델이라도, 학습한 데이터는 <strong>언제나 과거의 데이터</strong></div>

            <div class="timeline">
                <div class="dot"></div>
                <div class="line"></div>
                <div class="dot"></div>
                <div class="line" style="background: rgba(248, 113, 113, 0.25)"></div>
                <div class="dot now"></div>
            </div>
            <div class="labels">
                <div class="label">
                    <div class="label-tag">학습 시작</div>
                    <div class="label-text">~2024</div>
                </div>
                <div class="label cutoff">
                    <div class="label-tag">KNOWLEDGE CUTOFF</div>
                    <div class="label-text">2025.12 (GPT 5.5)</div>
                </div>
                <div class="label now">
                    <div class="label-tag">NOW · 모르는 영역</div>
                    <div class="label-text">2026.05</div>
                </div>
            </div>

            <div class="below">
                컷오프 이후 일은 <strong>모릅니다</strong> — 어제 출시된 신제품도, 오늘 발표된 정책도. 그러면서
                <em>"음, 아마 이렇게 됐을 것"</em>이라고 추측해서 답해버립니다. 환각으로 이어지는 가장 흔한 길.
                <strong>작년에 인쇄된 백과사전을 들고 다니는 천재 학생</strong>이라고 비유하면 정확합니다.
            </div>
        </div>
        <nav class="slide-nav">
            <div class="slide-nav-inner">
                <div class="nav-left">
                    <a
                        href="07-probability-not-luck.html"
                        onclick="
                            event.preventDefault();
                            navigateTo(this.href);
                        "
                        >&larr; 이전</a
                    >
                </div>
                <div class="nav-center"><a href="index.html">08 / 23</a></div>
                <div class="nav-right">
                    <a
                        href="09-guidance-raises-probability.html"
                        onclick="
                            event.preventDefault();
                            navigateTo(this.href);
                        "
                        >다음 &rarr;</a
                    >
                </div>
            </div>
        </nav>
        <script>
            function navigateTo(url) {
                document.body.classList.add("fade-out");
                setTimeout(function () {
                    window.location.href = url;
                }, 300);
            }
            document.addEventListener("keydown", function (e) {
                if (e.key === "ArrowLeft") navigateTo("07-probability-not-luck.html");
                if (e.key === "ArrowRight") navigateTo("09-guidance-raises-probability.html");
            });
        </script>
    </body>
</html>
