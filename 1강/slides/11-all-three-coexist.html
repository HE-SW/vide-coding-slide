<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>셋 다 동시에 쓰고 있습니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title {
  font-size: 46px; font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 14px; line-height: 1.3;
}
.subtitle { font-size: 17px; color: #8b949e; margin-bottom: 40px; font-weight: 300; }
.layout { display: flex; gap: 60px; align-items: center; max-width: 1100px; }
.diagram {
  position: relative; width: 420px; height: 420px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ring {
  position: absolute; border-radius: 50%;
  display: flex; align-items: flex-start; justify-content: center;
  font-weight: 900; padding-top: 22px;
  letter-spacing: 1px;
}
.ring.outer {
  width: 420px; height: 420px;
  background: rgba(56, 189, 248, 0.06);
  border: 2px solid rgba(56, 189, 248, 0.4);
  font-size: 17px; color: #38bdf8;
}
.ring.middle {
  width: 290px; height: 290px;
  background: rgba(124, 58, 237, 0.1);
  border: 2px solid rgba(124, 58, 237, 0.5);
  font-size: 16px; color: #a78bfa;
}
.ring.inner {
  width: 170px; height: 170px;
  background: rgba(167, 139, 250, 0.18);
  border: 2px solid rgba(167, 139, 250, 0.7);
  font-size: 15px; color: #e6edf3;
  align-items: center; padding-top: 0;
  text-align: center; line-height: 1.4;
}
.legend { flex: 1; display: flex; flex-direction: column; gap: 14px; }
.l-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 20px;
  background: rgba(139, 148, 158, 0.04);
  border: 1px solid rgba(139, 148, 158, 0.1);
  border-radius: 12px;
}
.l-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.l-dot.h { background: #38bdf8; }
.l-dot.c { background: #7c3aed; }
.l-dot.p { background: #a78bfa; }
.l-text { font-size: 14px; line-height: 1.6; color: #c9d1d9; }
.l-text strong { color: #e6edf3; font-weight: 700; }
.bottom {
  margin-top: 36px; padding: 18px 28px; max-width: 980px;
  background: rgba(124, 58, 237, 0.06);
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 12px;
  font-size: 16px; line-height: 1.6; color: #c9d1d9; text-align: center;
}
.bottom strong { color: #a78bfa; font-weight: 700; }
.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">셋 다 동시에 쓰고 있습니다</h1>
  <div class="subtitle">새 단어가 옛 단어를 대체한 게 아니라, <strong>포함 관계</strong>로 모두 살아있는 구조</div>

  <div class="layout">
    <div class="diagram">
      <div class="ring outer">HARNESS</div>
      <div class="ring middle">CONTEXT</div>
      <div class="ring inner">PROMPT</div>
    </div>
    <div class="legend">
      <div class="l-row"><div class="l-dot p"></div><div class="l-text"><strong>가장 안쪽 핵 — 프롬프트</strong><br>한 번의 질문을 어떻게 던질 것인가</div></div>
      <div class="l-row"><div class="l-dot c"></div><div class="l-text"><strong>그 바깥 — 컨텍스트</strong><br>프롬프트 + 자료 + 도구 출력 + 대화 요약을 어떻게 채울 것인가</div></div>
      <div class="l-row"><div class="l-dot h"></div><div class="l-text"><strong>모두 감싸는 — 하니스</strong><br>그 모든 호출을 반복·검증·자동화하는 환경</div></div>
    </div>
  </div>

  <div class="bottom">"프롬프트는 옛날 거다"가 아닙니다 — <strong>안쪽 핵은 그대로, 바깥 껍질이 더해진 것</strong></div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="10-three-engineering.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">11 / 23</a></div>
    <div class="nav-right"><a href="12-prompt-example.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('10-three-engineering.html');
  if (e.key === 'ArrowRight') navigateTo('12-prompt-example.html');
});
</script>
</body>
</html>
