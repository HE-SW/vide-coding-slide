<!DOCTYPE html>
<html lang="ko">
<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: 'Noto Sans KR', sans-serif; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-bottom: 50px; }
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title {

  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 14px; line-height: 1.3;
}
.subtitle { font-size: 17px; color: #8b949e; margin-bottom: 36px; font-weight: 300; }

.table {
  width: 100%; max-width: 1000px;
  background: rgba(139, 148, 158, 0.04);
  border: 1px solid rgba(139, 148, 158, 0.15);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 32px;
}
.t-row { display: grid; grid-template-columns: 1.6fr 1fr 1fr; align-items: center; }
.t-row + .t-row { border-top: 1px solid rgba(139, 148, 158, 0.1); }
.t-row.head { background: rgba(124, 58, 237, 0.08); }
.t-cell {
  padding: 14px 22px;
  font-size: 15px;
  color: #c9d1d9;
}
.t-cell.head-text { font-weight: 800; color: #e6edf3; font-size: 14px; }
.t-cell.center { text-align: center; font-size: 22px; }
.t-cell.web-no { color: #f87171; }
.t-cell.cli-yes { color: #38bdf8; }

.metaphor {
  display: flex; gap: 24px; max-width: 1000px; width: 100%;
}
.m-card {
  flex: 1; padding: 22px 24px;
  background: rgba(139, 148, 158, 0.04);
  border: 1px solid rgba(139, 148, 158, 0.12);
  border-radius: 14px;
  display: flex; gap: 16px; align-items: center;
}
.m-card.cli { border-color: rgba(124, 58, 237, 0.4); background: rgba(124, 58, 237, 0.05); }
.m-emoji { font-size: 42px; flex-shrink: 0; }
.m-text { font-size: 14px; line-height: 1.55; color: #c9d1d9; }
.m-text strong { color: #e6edf3; font-weight: 700; }
.m-card.cli .m-text strong { color: #a78bfa; }

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

<body>

      <div class="t-cell head-text" style="text-align:center;">Claude Code (CLI)</div>
    </div>
    <div class="t-row">
      <div class="t-cell">글로 묻고 답 받기</div>

    </div>

    </div>
  </div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="19-claude-code-detail.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>

  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('19-claude-code-detail.html');
  if (e.key === 'ArrowRight') navigateTo('21-claude-md-role.html');
