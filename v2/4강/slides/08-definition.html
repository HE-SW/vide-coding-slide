<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>AI-Ready Codebase · 정의</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0 80px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: ''; position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: #14b8a6;
  filter: blur(160px); opacity: 0.12;
  top: -220px; left: -140px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: #38bdf8;
  filter: blur(140px); opacity: 0.14;
  bottom: -200px; right: -120px;
  pointer-events: none; z-index: 0;
}

.container {
  width: 1280px; padding: 0 80px;
  display: flex; flex-direction: column; align-items: center;
  position: relative; z-index: 1;
}

.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: 3px;
  padding: 6px 16px;
  border-radius: 999px;
  background: rgba(20, 184, 166, 0.12);
  border: 1px solid rgba(20, 184, 166, 0.4);
  color: #5eead4;
  margin-bottom: 26px;
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #2dd4bf;
  box-shadow: 0 0 8px #2dd4bf;
}

.hero {
  width: 100%;
  max-width: 1100px;
  background: linear-gradient(135deg, rgba(20, 184, 166, 0.10), rgba(56, 189, 248, 0.05));
  border: 1.5px solid rgba(20, 184, 166, 0.4);
  border-radius: 18px;
  padding: 36px 40px;
  text-align: center;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #2dd4bf, #38bdf8);
}
.hero-label {
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  color: #8b949e;
  margin-bottom: 14px;
}
.hero-quote {
  font-size: 40px;
  font-weight: 900;
  color: #ffffff;
  line-height: 1.25;
  letter-spacing: -1px;
}
.hero-quote .mark {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 900;
  color: #2dd4bf;
  opacity: 0.6;
}

.cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  width: 100%;
  max-width: 1100px;
  margin-bottom: 18px;
}
.col {
  background: rgba(22, 27, 40, 0.55);
  border: 1px solid rgba(139, 148, 158, 0.18);
  border-radius: 14px;
  padding: 22px 24px 20px;
  opacity: 0;
  transform: translateY(12px);
  animation: colIn 0.5s ease-out forwards;
}
.col:nth-child(1) { animation-delay: 0.15s; }
.col:nth-child(2) { animation-delay: 0.3s; }
@keyframes colIn { to { opacity: 1; transform: translateY(0); } }

.col-head {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: #5eead4;
  margin-bottom: 10px;
}
.col-lead {
  font-size: 16px; font-weight: 700;
  color: #e6edf3;
  line-height: 1.5;
  margin-bottom: 12px;
}
.col-list {
  display: flex; flex-direction: column;
  gap: 7px;
  margin-bottom: 14px;
}
.col-list .item {
  display: grid; grid-template-columns: 18px 1fr;
  gap: 8px;
  font-size: 14.5px;
  color: #c9d1d9;
  line-height: 1.55;
}
.col-list .item .arrow { color: #2dd4bf; font-weight: 800; }
.col-list .item .arrow.mute { color: #8b949e; }
.col-foot {
  font-size: 14.5px;
  font-weight: 700;
  color: #e6edf3;
  line-height: 1.55;
  padding-top: 12px;
  border-top: 1px dashed rgba(20, 184, 166, 0.25);
}
.col-foot em {
  font-style: normal;
  font-weight: 900;
  background: linear-gradient(135deg, #2dd4bf, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.memo {
  width: 100%;
  max-width: 1100px;
  background: rgba(15, 20, 32, 0.7);
  border: 1px dashed rgba(139, 148, 158, 0.3);
  border-radius: 12px;
  padding: 12px 22px;
  display: flex; align-items: center; gap: 18px;
}
.memo-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 700; letter-spacing: 1.5px;
  color: #8b949e;
  padding: 4px 9px;
  border-radius: 4px;
  background: rgba(139, 148, 158, 0.1);
  border: 1px solid rgba(139, 148, 158, 0.25);
  flex-shrink: 0;
}
.memo-line {
  font-size: 14px;
  color: #c9d1d9;
  line-height: 1.5;
}
.memo-line .q {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: #fcd34d;
}
.memo-line b { color: #e6edf3; font-weight: 700; }

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body.fade-init { opacity: 0; animation: fadeIn 0.5s ease forwards; }
body.fade-out  { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body class="fade-init">
<div class="container">
  <div class="eyebrow"><span class="dot"></span>AI-READY CODEBASE &nbsp;·&nbsp; 정의</div>

  <div class="hero">
    <div class="hero-label">한 문장으로 정의하면</div>
    <div class="hero-quote"><span class="mark">"</span>AI를 위한 지도가 그려져 있는 코드베이스<span class="mark">"</span></div>
  </div>

  <div class="cols">
    <div class="col">
      <div class="col-head">AI에게 — 길을 잃지 않도록</div>
      <div class="col-lead">미리 표시해둔 코드베이스</div>
      <div class="col-list">
        <div class="item"><span class="arrow">→</span><span>어디가 어떤 모듈인지</span></div>
        <div class="item"><span class="arrow">→</span><span>어디서부터 봐야 하는지</span></div>
        <div class="item"><span class="arrow">→</span><span>어디는 건드리면 안 되는지</span></div>
      </div>
    </div>

    <div class="col">
      <div class="col-head">사람 신입에게 — 주는 것과 동일하게</div>
      <div class="col-lead">AI에게도 똑같이 <em>"지도"</em>를 제공하는 것</div>
      <div class="col-list">
        <div class="item"><span class="arrow mute">·</span><span>온보딩 문서</span></div>
        <div class="item"><span class="arrow mute">·</span><span>위키</span></div>
        <div class="item"><span class="arrow mute">·</span><span>가이드</span></div>
      </div>
    </div>
  </div>

  <div class="memo">
    <span class="memo-tag">NEXT</span>
    <div class="memo-line">다음 슬라이드의 Meta 블로그 첫 줄 — <span class="q">"AI had no map."</span> &nbsp; <b>AI에게 지도가 없었다.</b></div>
  </div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="07-scale-gap.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">08 / 18</a></div>
    <div class="nav-right"><a href="09-meta-failures.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('07-scale-gap.html');
  if (e.key === 'ArrowRight') navigateTo('09-meta-failures.html');
});
</script>
</body>
</html>
