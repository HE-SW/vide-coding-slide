<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Technique 02 — 컨텍스트 & 비용 최적화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0 80px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: ''; position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: #fbbf24;
  filter: blur(170px); opacity: 0.12;
  top: -220px; left: -140px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: #f97316;
  filter: blur(150px); opacity: 0.13;
  bottom: -200px; right: -120px;
  pointer-events: none; z-index: 0;
}

.container { width: 1280px; padding: 0 90px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: 2.5px;
  padding: 6px 16px;
  border-radius: 999px;
  background: rgba(251, 191, 36, 0.12);
  border: 1px solid rgba(251, 191, 36, 0.4);
  color: #fcd34d;
  margin-bottom: 14px;
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fbbf24;
  box-shadow: 0 0 8px #fbbf24;
}

.meta-row {
  display: flex; align-items: center; gap: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #8b949e;
  letter-spacing: 1px;
  margin-bottom: 22px;
}
.meta-row .sep { color: #484f58; }
.meta-row b { color: #fcd34d; font-weight: 700; }

.title {
  font-size: 64px;
  font-weight: 900;
  color: #ffffff;
  text-align: center;
  margin-bottom: 22px;
  line-height: 1.1;
  letter-spacing: -1.5px;
}

.lead {
  font-size: 18px;
  color: #c9d1d9;
  text-align: center;
  line-height: 1.7;
  margin-bottom: 36px;
  max-width: 920px;
}
.lead .l1 { display: block; }
.lead .l2 { display: block; margin-top: 6px; color: #fcd34d; font-weight: 700; }
.lead em {
  font-style: normal; font-weight: 800;
  color: #fcd34d;
}

.agenda {
  width: 100%;
  max-width: 1100px;
}
.agenda-title {
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  color: #fcd34d;
  margin-bottom: 18px;
  text-align: center;
}
.agenda-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.agenda-item {
  background: rgba(22, 27, 40, 0.6);
  border: 1px solid rgba(251, 191, 36, 0.3);
  border-radius: 12px;
  padding: 18px 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  gap: 12px;
  min-height: 120px;
  text-align: center;
  opacity: 0;
  transform: translateY(12px);
  animation: itemIn 0.4s ease-out forwards;
}
.agenda-item:nth-child(1) { animation-delay: 0.15s; }
.agenda-item:nth-child(2) { animation-delay: 0.27s; }
.agenda-item:nth-child(3) { animation-delay: 0.39s; }
.agenda-item:nth-child(4) { animation-delay: 0.51s; }
@keyframes itemIn { to { opacity: 1; transform: translateY(0); } }

.agenda-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(251, 191, 36, 0.18);
  border: 1px solid rgba(251, 191, 36, 0.5);
  color: #fcd34d;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.agenda-text {
  font-size: 15.5px;
  font-weight: 700;
  color: #e6edf3;
  line-height: 1.45;
}
.agenda-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: #fcd34d;
  background: rgba(0, 0, 0, 0.3);
  padding: 1px 7px;
  border-radius: 4px;
}

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body.fade-init { opacity: 0; animation: fadeIn 0.5s ease forwards; }
body.fade-out  { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body class="fade-init">
<div class="container">
  <div class="eyebrow"><span class="dot"></span>TECHNIQUE 02 — COST</div>
  <div class="meta-row">SECTION <b>2</b> / 3 <span class="sep">·</span> <b>15분</b> <span class="sep">·</span> TECHNIQUE 02</div>
  <h1 class="title">컨텍스트 &amp; 비용 최적화</h1>
  <p class="lead">
    <span class="l1">AI-Native로 갈수록 <em>토큰이 폭증</em>한다</span>
    <span class="l2">— 비용을 줄이면서 결과 품질은 올리는 방법</span>
  </p>

  <div class="agenda">
    <div class="agenda-title">이번 섹션에서 다룰 내용</div>
    <div class="agenda-list">
      <div class="agenda-item">
        <div class="agenda-num">1</div>
        <div class="agenda-text">컨텍스트<br>= 비용 = 품질</div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num">2</div>
        <div class="agenda-text">3가지 원칙</div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num">3</div>
        <div class="agenda-text">Sub-Agent 보호</div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num">4</div>
        <div class="agenda-text">Active vs Passive</div>
      </div>
    </div>
  </div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="13-live-demo-score.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">14 / 18</a></div>
    <div class="nav-right"><a href="15-context-cost-quality.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('13-live-demo-score.html');
  if (e.key === 'ArrowRight') navigateTo('15-context-cost-quality.html');
});
</script>
</body>
</html>
