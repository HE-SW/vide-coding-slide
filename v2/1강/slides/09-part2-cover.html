<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1280" />
        <title>2부 — 단어 4개로 LLM의 정체 — v2/1강</title>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0f1a;
                font-family: "Noto Sans KR", sans-serif;
                color: #e6edf3;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding-bottom: 50px;
            }
            .container {
                width: 1280px;
                padding: 44px 80px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .eyebrow {
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 4px;
                color: #a78bfa;
                margin-bottom: 14px;
                text-transform: uppercase;
            }
            .title {
                font-size: 44px;
                font-weight: 900;
                background: linear-gradient(135deg, #7c3aed, #38bdf8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                text-align: center;
                margin-bottom: 18px;
                line-height: 1.3;
            }
            .subtitle {
                font-size: 17px;
                color: #8b949e;
                text-align: center;
                margin-bottom: 32px;
                line-height: 1.6;
            }
            .note {
                text-align: center;
                font-size: 15px;
                color: #8b949e;
                margin-top: 18px;
                line-height: 1.6;
            }
            .note strong {
                color: #c9d1d9;
            }
            .callout {
                margin-top: 22px;
                padding: 14px 24px;
                background: rgba(124, 58, 237, 0.08);
                border: 1px solid rgba(124, 58, 237, 0.3);
                border-radius: 10px;
                font-size: 15px;
                color: #c9d1d9;
                text-align: center;
                max-width: 900px;
            }
            .callout strong {
                color: #a78bfa;
            }

            /* 코드 박스 */
            .code-box {
                background: rgba(22, 27, 40, 0.85);
                border: 1px solid rgba(124, 58, 237, 0.25);
                border-radius: 12px;
                padding: 20px 28px;
                font-family: "Courier New", monospace;
                font-size: 14px;
                color: #c9d1d9;
                white-space: pre;
                line-height: 1.7;
                max-width: 1080px;
                width: 100%;
                overflow-x: auto;
            }
            .code-box .hl {
                color: #a78bfa;
                font-weight: 700;
            }
            .code-box .dim {
                color: #6e7681;
            }
            .code-box .ok {
                color: #34d399;
            }
            .code-box .bad {
                color: #ef4444;
            }

            /* 프롬프트 박스 (함께 입력) */
            .prompt-box {
                background: rgba(22, 27, 40, 0.8);
                border: 1px solid rgba(124, 58, 237, 0.3);
                border-radius: 12px;
                padding: 16px 24px;
                font-family: "Courier New", monospace;
                font-size: 15px;
                color: #c9d1d9;
                margin-bottom: 28px;
                max-width: 900px;
                width: 100%;
            }
            .prompt-tag {
                display: inline-block;
                font-family: "Noto Sans KR", sans-serif;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1px;
                color: #a78bfa;
                background: rgba(124, 58, 237, 0.15);
                padding: 3px 10px;
                border-radius: 4px;
                margin-bottom: 8px;
            }
            .prompt-arrow {
                color: #7c3aed;
            }

            /* 2-col 비교 */
            .compare-2col {
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                gap: 18px;
                align-items: stretch;
                width: 100%;
                max-width: 1100px;
            }
            .comp-side {
                border-radius: 14px;
                padding: 22px 26px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .comp-old {
                background: rgba(139, 148, 158, 0.06);
                border: 1px solid rgba(139, 148, 158, 0.18);
            }
            .comp-new {
                background: rgba(124, 58, 237, 0.08);
                border: 1px solid rgba(124, 58, 237, 0.3);
            }
            .comp-label {
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 1px;
            }
            .comp-old .comp-label {
                color: #8b949e;
            }
            .comp-new .comp-label {
                color: #a78bfa;
            }
            .comp-body {
                font-size: 14px;
                color: #c9d1d9;
                line-height: 1.7;
            }
            .comp-body code {
                font-family: "Courier New", monospace;
                font-size: 13px;
                color: #e6edf3;
                background: rgba(0, 0, 0, 0.25);
                padding: 1px 6px;
                border-radius: 3px;
            }
            .comp-arrow {
                font-size: 26px;
                color: #7c3aed;
                align-self: center;
            }

            /* 카드 그리드 (2x2 / 3개 / 4개) */
            .card-grid {
                display: grid;
                gap: 16px;
                width: 100%;
                max-width: 1100px;
            }
            .card-grid-2 {
                grid-template-columns: 1fr 1fr;
            }
            .card-grid-3 {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .card-grid-4 {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
            .card {
                background: rgba(139, 148, 158, 0.04);
                border: 1px solid rgba(139, 148, 158, 0.15);
                border-radius: 12px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .card.accent {
                background: rgba(124, 58, 237, 0.06);
                border-color: rgba(124, 58, 237, 0.3);
            }
            .card {
                display: grid !important;
                grid-template-columns: auto 1fr;
                grid-template-areas: "num title" "body body";
                column-gap: 16px;
                row-gap: 14px;
                align-items: center;
                padding: 22px !important;
            }
            .card .card-num {
                grid-area: num;
                font-size: 32px;
                font-weight: 900;
                color: #a78bfa;
                line-height: 1;
            }
            .card .card-title {
                grid-area: title;
                font-size: 22px;
                font-weight: 900;
                color: #ffffff;
                line-height: 1.3;
            }
            .card .card-body {
                grid-area: body;
                font-size: 15px;
                color: #c9d1d9;
                line-height: 1.7;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .card .card-body p {
                margin: 0;
            }
            .card .card-body .bullets {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .card .card-body .accent-line {
                color: #a78bfa;
                font-weight: 700;
            }

            /* 동심원 */
            .three-circles {
                position: relative;
                width: 520px;
                height: 380px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .circle {
                position: absolute;
                border-radius: 50%;
                border: 2px solid;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 900;
                font-family: "Noto Sans KR", sans-serif;
            }
            .circle-outer {
                width: 380px;
                height: 380px;
                border-color: #38bdf8;
                background: rgba(56, 189, 248, 0.04);
                color: #38bdf8;
                font-size: 18px;
                align-items: flex-start;
                padding-top: 18px;
            }
            .circle-mid {
                width: 240px;
                height: 240px;
                border-color: #a78bfa;
                background: rgba(167, 139, 250, 0.06);
                color: #a78bfa;
                font-size: 16px;
                align-items: flex-start;
                padding-top: 16px;
            }
            .circle-inner {
                width: 120px;
                height: 120px;
                border-color: #ec4899;
                background: rgba(236, 72, 153, 0.1);
                color: #f9a8d4;
                font-size: 14px;
            }

            /* 타임라인 */
            .timeline {
                width: 100%;
                max-width: 820px;
                padding-left: 12px;
            }
            .t-row {
                display: flex;
                gap: 24px;
                padding: 14px 0 14px 28px;
                border-left: 3px solid rgba(124, 58, 237, 0.4);
                position: relative;
            }
            .t-row::before {
                content: "";
                position: absolute;
                left: -9px;
                top: 22px;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #7c3aed;
                box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
            }
            .t-row.accent {
                border-color: rgba(56, 189, 248, 0.6);
            }
            .t-row.accent::before {
                background: #38bdf8;
                box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
            }
            .t-date {
                color: #a78bfa;
                font-weight: 700;
                min-width: 110px;
                font-family: "Courier New", monospace;
                font-size: 14px;
                padding-top: 2px;
            }
            .t-row.accent .t-date {
                color: #38bdf8;
            }
            .t-text {
                color: #c9d1d9;
                font-size: 15px;
                line-height: 1.5;
            }
            .t-text strong {
                color: #e6edf3;
            }

            /* 큰 숫자 hero */
            .hero-num {
                font-size: 84px;
                font-weight: 900;
                line-height: 1;
                background: linear-gradient(135deg, #ef4444, #f97316);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                text-align: center;
                margin: 6px 0 8px;
            }
            .hero-label {
                font-size: 16px;
                color: #8b949e;
                text-align: center;
                letter-spacing: 4px;
                text-transform: uppercase;
                margin-bottom: 26px;
            }

            /* U자 막대 차트 */
            .bar-chart {
                display: flex;
                gap: 36px;
                align-items: flex-end;
                height: 220px;
                margin: 14px 0 24px;
            }
            .bar-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .bar {
                width: 110px;
                border-radius: 8px 8px 0 0;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding-top: 10px;
                font-weight: 900;
                font-size: 18px;
                color: #e6edf3;
            }
            .bar.high {
                height: 200px;
                background: linear-gradient(180deg, #34d399, rgba(52, 211, 153, 0.3));
            }
            .bar.low {
                height: 70px;
                background: linear-gradient(180deg, #ef4444, rgba(239, 68, 68, 0.3));
            }
            .bar-label {
                font-size: 13px;
                color: #8b949e;
                font-weight: 700;
            }

            /* 태그 */
            .tags {
                display: flex;
                gap: 14px;
                flex-wrap: wrap;
                justify-content: center;
                margin-top: 18px;
            }
            .tag {
                padding: 10px 22px;
                border: 1px solid rgba(124, 58, 237, 0.3);
                border-radius: 100px;
                background: rgba(124, 58, 237, 0.08);
                font-size: 14px;
                font-weight: 500;
                color: #c9d1d9;
            }
            .tag strong {
                color: #a78bfa;
                font-weight: 700;
            }

            /* 네비 */
            .slide-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 50px;
                background: rgba(10, 15, 26, 0.95);
                backdrop-filter: blur(12px);
                border-top: 1px solid rgba(124, 58, 237, 0.2);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
            .slide-nav-inner {
                width: 1280px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 60px;
            }
            .slide-nav a {
                text-decoration: none;
                font-size: 14px;
                font-weight: 700;
                color: #7c3aed;
                transition: color 0.2s;
            }
            .slide-nav a:hover {
                color: #a78bfa;
            }
            .slide-nav .nav-disabled {
                font-size: 14px;
                font-weight: 700;
                color: #484f58;
                cursor: default;
            }
            .slide-nav .nav-center a {
                color: #8b949e;
                font-size: 13px;
                font-weight: 400;
            }
            .slide-nav .nav-center a:hover {
                color: #e6edf3;
            }

            body {
                opacity: 0;
                animation: fadeIn 0.4s ease forwards;
            }
            body.fade-out {
                animation: fadeOut 0.3s ease forwards;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeOut {
                from {
                    opacity: 1;
                    transform: translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateY(-12px);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 class="title"><br />LLM은 어떤 단점이 있을까요?</h1>
            <p class="cover-sub">
                바이브 코딩을 잘 쓰려면, <strong style="color: #a78bfa">LLM이 무엇을 못하는지</strong>부터 알아야 합니다.
            </p>
        </div>

        <nav class="slide-nav">
            <div class="slide-nav-inner">
                <div class="nav-left">
                    <a
                        href="07-vibe-before-after.html"
                        onclick="
                            event.preventDefault();
                            navigateTo(this.href);
                        "
                        >&larr; 이전</a
                    >
                </div>
                <div class="nav-center"><a href="index.html">09 / 48</a></div>
                <div class="nav-right">
                    <a
                        href="10-llm-definition.html"
                        onclick="
                            event.preventDefault();
                            navigateTo(this.href);
                        "
                        >다음 &rarr;</a
                    >
                </div>
            </div>
        </nav>

        <script>
            function navigateTo(url) {
                document.body.classList.add("fade-out");
                setTimeout(function () {
                    window.location.href = url;
                }, 300);
            }
            document.addEventListener("keydown", function (e) {
                if (e.key === "ArrowLeft") navigateTo("07-vibe-before-after.html");
                if (e.key === "ArrowRight") navigateTo("10-llm-definition.html");
            });
        </script>
    </body>
</html>
