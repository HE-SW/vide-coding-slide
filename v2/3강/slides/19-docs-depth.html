<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>docs가 얕으면 결과도 얕다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0 80px;
}
.container { width: 1280px; padding: 0 80px; display: flex; flex-direction: column; align-items: center; }
.title {
  font-size: 46px;
  font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.2;
}
.kicker { font-size: 16px; color: #8b949e; text-align: center; margin-bottom: 8px; font-weight: 400; }

.io-cards { display: flex; align-items: stretch; gap: 14px; width: 100%; max-width: 1120px; margin-bottom: 24px; }
.io-card { flex: 1; border-radius: 14px; padding: 14px 24px; }
.io-card.in  { background: rgba(56, 189, 248, 0.07); border: 1px solid rgba(56, 189, 248, 0.35); }
.io-card.out { background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.4); }
.io-label { font-size: 12.5px; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
.io-card.in .io-label  { color: #38bdf8; }
.io-card.out .io-label { color: #a78bfa; }
.io-text { font-size: 18px; font-weight: 800; color: #e6edf3; line-height: 1.3; }
.io-sub { display: block; margin-top: 6px; font-size: 12px; font-weight: 400; color: #8b949e; font-family: 'JetBrains Mono', monospace; line-height: 1.55; }
.io-eq-mid { display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; color: #c9d1d9; flex-shrink: 0; padding: 0 2px; }

.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1120px; margin-bottom: 24px; }
.col {
  border-radius: 16px;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.col.before { background: rgba(244, 63, 94, 0.06); border: 1px solid rgba(244, 63, 94, 0.3); }
.col.after  { background: rgba(52, 211, 153, 0.06); border: 1px solid rgba(52, 211, 153, 0.35); }
.col-head { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.col.before .col-head { color: #fb7185; }
.col.after  .col-head { color: #34d399; }
.col-head .badge {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 3px 9px; border-radius: 999px;
}
.col.before .col-head .badge { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.4); }
.col.after  .col-head .badge { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.4); }

.case { background: rgba(0, 0, 0, 0.25); border-radius: 11px; padding: 13px 16px; }
.case-in {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px; font-weight: 600;
  margin-bottom: 7px;
}
.col.before .case-in { color: #c9d1d9; }
.col.after  .case-in { color: #ffd166; }
.case-out { font-size: 14.5px; line-height: 1.5; display: flex; align-items: flex-start; gap: 7px; }
.case-out .ar { flex-shrink: 0; }
.col.before .case-out { color: #c9d1d9; }
.col.before .case-out .ar { color: #fb7185; }
.col.after  .case-out { color: #e6edf3; }
.col.after  .case-out .ar { color: #34d399; }
.col.after  .case-out strong { color: #34d399; font-weight: 700; }

.punch {
  width: 100%; max-width: 1120px;
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.16), rgba(56, 189, 248, 0.09));
  border: 1.5px solid rgba(124, 58, 237, 0.5);
  border-radius: 14px;
  padding: 16px 26px;
  text-align: center;
  position: relative; overflow: hidden;
}
.punch::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #7c3aed, #38bdf8); }
.punch-text { font-size: 19px; font-weight: 900; color: #e6edf3; line-height: 1.4; }
.punch-text em {
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  font-style: normal;
}

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <p class="kicker">프레임워크가 아무리 좋아도</p>
  <h1 class="title">docs가 얕으면 결과도 얕다</h1>

  <div class="io-cards">
    <div class="io-card in">
      <div class="io-label">📥 입력</div>
      <div class="io-text">하니스에 뭘 넣느냐</div>
    </div>
    <div class="io-eq-mid">=</div>
    <div class="io-card out">
      <div class="io-label">📤 출력</div>
      <div class="io-text">결과의 품질</div>
    </div>
  </div>

  <div class="cols">
    <div class="col before">
      <div class="col-head"><span class="badge">BEFORE</span>디자인 가이드 없이</div>
      <div class="case">
        <div class="case-in">PRD + ARCHITECTURE + ADR</div>
        <div class="case-out"><span class="ar">▶</span><span>기본 Tailwind, 밋밋한 UI</span></div>
      </div>
      <div class="case">
        <div class="case-in">엣지 케이스 미기술</div>
        <div class="case-out"><span class="ar">▶</span><span>API 파싱 에러</span></div>
      </div>
    </div>
    <div class="col after">
      <div class="col-head"><span class="badge">AFTER</span>UI_GUIDE + 엣지 케이스 추가 후</div>
      <div class="case">
        <div class="case-in">+ UI_GUIDE.md</div>
        <div class="case-out"><span class="ar">▶</span><span>안티 슬롭, <strong>깔끔한 다크 UI</strong></span></div>
      </div>
      <div class="case">
        <div class="case-in">+ ADR-009</div>
        <div class="case-out"><span class="ar">▶</span><span><strong>JSON 파싱 에러 해결</strong></span></div>
      </div>
    </div>
  </div>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="18-next-lecture.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">19 / 21</a></div>
    <div class="nav-right"><a href="20-summary-takeaway.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('18-next-lecture.html');
  if (e.key === 'ArrowRight') navigateTo('20-summary-takeaway.html');
});
</script>
</body>
</html>
