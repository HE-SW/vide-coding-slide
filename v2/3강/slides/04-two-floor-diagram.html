<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>한 층만 더 올리면 됩니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0f1a;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 50px;
}
.container { width: 1280px; padding: 44px 80px; display: flex; flex-direction: column; align-items: center; }
.title {
  font-size: 50px;
  font-weight: 900;
  background: linear-gradient(135deg, #7c3aed, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  margin-bottom: 14px;
  line-height: 1.2;
  letter-spacing: -1px;
}
.subtitle { font-size: 17px; color: #8b949e; text-align: center; margin-bottom: 44px; font-weight: 400; }

.building { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 6px; }

.floor {
  background: rgba(22, 27, 40, 0.8);
  border-radius: 18px;
  padding: 24px 32px;
  position: relative;
  overflow: hidden;
}
.floor-2 {
  border: 1.5px solid rgba(124, 58, 237, 0.5);
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.10), rgba(56, 189, 248, 0.04));
  opacity: 0;
  transform: translateY(-30px);
  animation: dropIn 0.5s ease-out 0.4s forwards;
}
.floor-1 {
  border: 1px solid rgba(139, 148, 158, 0.25);
  opacity: 0;
  transform: translateY(20px);
  animation: dropIn 0.5s ease-out 0.15s forwards;
}
@keyframes dropIn { to { opacity: 1; transform: translateY(0); } }

.floor-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.floor-tag {
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  padding: 5px 12px; border-radius: 999px;
}
.floor-2 .floor-tag {
  color: #a78bfa;
  background: rgba(124, 58, 237, 0.15);
  border: 1px solid rgba(124, 58, 237, 0.4);
}
.floor-1 .floor-tag {
  color: #8b949e;
  background: rgba(139, 148, 158, 0.08);
  border: 1px solid rgba(139, 148, 158, 0.25);
}
.floor-name { font-size: 20px; font-weight: 900; color: #e6edf3; }
.floor-1 .floor-name { color: #c9d1d9; }
.floor-meta { font-size: 13px; color: #8b949e; }

.floor-boxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.box {
  border-radius: 10px;
  padding: 16px 14px;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
}
.floor-2 .box {
  background: rgba(124, 58, 237, 0.18);
  border: 1px solid rgba(124, 58, 237, 0.45);
  color: #e6edf3;
}
.floor-1 .box {
  background: rgba(139, 148, 158, 0.06);
  border: 1px solid rgba(139, 148, 158, 0.2);
  color: #c9d1d9;
}

.foot {
  margin-top: 30px;
  font-size: 16px;
  color: #c9d1d9;
  text-align: center;
  line-height: 1.7;
}
.foot strong { color: #a78bfa; font-weight: 700; }

.slide-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(124, 58, 237, 0.2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.slide-nav-inner { width: 1280px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
.slide-nav a { text-decoration: none; font-size: 14px; font-weight: 700; color: #7c3aed; transition: color 0.2s; }
.slide-nav a:hover { color: #a78bfa; }
.slide-nav .nav-disabled { font-size: 14px; font-weight: 700; color: #484f58; cursor: default; }
.slide-nav .nav-center a { color: #8b949e; font-size: 13px; font-weight: 400; }
.slide-nav .nav-center a:hover { color: #e6edf3; }
body { opacity: 0; animation: fadeIn 0.4s ease forwards; }
body.fade-out { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
</style>
</head>
<body>
<div class="container">
  <h1 class="title">한 층만 더 올리면 됩니다</h1>
  <p class="subtitle">2층짜리 건물 한 채 — 1층은 이미 깔려 있고, 2층은 여러분이 올리는 층</p>

  <div class="building">
    <div class="floor floor-2">
      <div class="floor-header">
        <div>
          <span class="floor-tag">2층</span>
          <span class="floor-name" style="margin-left:10px">내 프로젝트 하니스</span>
        </div>
        <span class="floor-meta">여러분이 추가</span>
      </div>
      <div class="floor-boxes">
        <div class="box">CLAUDE.md</div>
        <div class="box">docs/</div>
        <div class="box">skills/</div>
        <div class="box">hooks/</div>
      </div>
    </div>

    <div class="floor floor-1">
      <div class="floor-header">
        <div>
          <span class="floor-tag">1층</span>
          <span class="floor-name" style="margin-left:10px">내장 하니스 — claude code 자체</span>
        </div>
        <span class="floor-meta">이미 있음</span>
      </div>
      <div class="floor-boxes">
        <div class="box">시스템프롬프트</div>
        <div class="box">권한체크</div>
        <div class="box">도구경계</div>
        <div class="box">JSON스키마</div>
      </div>
    </div>
  </div>

  <p class="foot">오늘 우리가 할 일은 단 하나 — <strong>이 한 층을 올리는 것</strong>.<br>1층은 손댈 필요 없으니, 2층 짓는 법만 보면 됩니다.</p>
</div>
<nav class="slide-nav">
  <div class="slide-nav-inner">
    <div class="nav-left"><a href="03-other-builtin.html" onclick="event.preventDefault(); navigateTo(this.href)">&larr; 이전</a></div>
    <div class="nav-center"><a href="index.html">04 / 21</a></div>
    <div class="nav-right"><a href="05-oh-my-claudecode.html" onclick="event.preventDefault(); navigateTo(this.href)">다음 &rarr;</a></div>
  </div>
</nav>
<script>
function navigateTo(url) { document.body.classList.add('fade-out'); setTimeout(function() { window.location.href = url; }, 300); }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') navigateTo('03-other-builtin.html');
  if (e.key === 'ArrowRight') navigateTo('05-oh-my-claudecode.html');
});
</script>
</body>
</html>
